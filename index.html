/* ==================== AUDIO ENGINE ==================== */
let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function playNote(freq, duration, type = 'sine', volume = 0.15) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playTransitionSound() {
  // C5 -> E5 -> G5 上升音阶

}

  if (!('speechSynthesis' in window)) return;
  const utter = new SpeechSynthesisUtterance(text);

  utter.rate = 1.1;
  utter.pitch = 1;
  utter.volume = 0.8;
  speechSynthesis.speak(utter);
}

/* ==================== IMAGE LOADER ==================== */
const imageCache = new Map();

function loadImage(url) {
  if (imageCache.has(url)) {
    return Promise.resolve(imageCache.get(url));
  }
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      imageCache.set(url, img);
      resolve(img);
    };
    img.onerror = () => {
      // 失败时用备用图
      resolve(null);
    };
    img.src = url;
  });
}

    const keys = Object.keys(RECIPES);
    r = RECIPES[keys[Math.floor(Math.random() * keys.length)]];
    showToast(`"${t}"暂无内置菜谱，已为你推荐`);
  }
  state.recipe = JSON.parse(JSON.stringify(r));

  // 为每个步骤分配图片
  const imgLib = foodImages[t] || genericStepImages;
  state.recipe.steps = state.recipe.steps.map((s, i) => ({
    text: s,
    imageUrl: imgLib[i % imgLib.length]
  }));

  // 渲染菜谱
  $('#recipe-name').textContent = t + ' ' + r.emoji;
  $('#recipe-desc').textContent = r.desc;
  const ing = r.ingredients.map(i => `<div class="ingredient-item">• ${i.n} ${i.q}</div>`).join('');
  $('#recipe-ingredients').innerHTML = '<div style="font-weight:600;color:#d85a1f;margin-bottom:8px;font-size:13px">🥗 所需食材</div>' + ing;
  const steps = r.steps.map((s, i) => `<div class="step-item"><div class="step-text"><span class="step-number">${i+1}</span>${s}</div></div>`).join('');
  $('#recipe-steps').innerHTML = `<div class="section-title" style="margin-top:4px">👨‍🍳 烹饪步骤 (${r.steps.length} 步)</div>${steps}`;

  $('#view-setup').style.display = 'none';
  $('#view-recipe').style.display = 'block';
  window.scrollTo(0, 0);

  playTransitionSound();
};

/* ==================== BACK BUTTONS ==================== */
$('#btn-back1').onclick = () => {
  $('#view-recipe').style.display = 'none';
  $('#view-setup').style.display = 'block';
};

$('#btn-back2').onclick = () => {
  $('#view-video').style.display = 'none';
  $('#view-recipe').style.display = 'block';
};

/* ==================== VIDEO RENDERING ==================== */
const W = 720, H = 1280;

$('#btn-video').onclick = async () => {
  $('#view-recipe').style.display = 'none';
  $('#view-video').style.display = 'block';
  $('#video-title').textContent = state.theme + ' ' + state.recipe.emoji;
  $('#btn-download').style.display = 'none';

  const canvas = $('#preview-canvas');
  const ctx = canvas.getContext('2d');
  const info = $('#video-info');
  info.textContent = '⏳ 正在加载图片...';

  // 预加载所有图片
  const urls = state.recipe.steps.map(s => s.imageUrl);
  const images = await Promise.all(urls.map(u => loadImage(u)));
  info.textContent = '⏳ 正在生成视频...';

  // 初始化音频
  initAudio();
  playStepSound();

  // MediaRecorder
  let mediaRecorder, chunks = [];
  const stream = canvas.captureStream(30);
  try {
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
  } catch (e) {
    try {
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    } catch (e2) {
      info.textContent = '❌ 你的浏览器不支持视频录制';
      return;
    }
  }

  mediaRecorder.ondataavailable = e => {
    if (e.data && e.data.size > 0) chunks.push(e.data);
  };

  mediaRecorder.onstop = () => {
    state.videoBlob = new Blob(chunks, { type: 'video/webm' });
    const url = URL.createObjectURL(state.videoBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = state.theme + '-烹饪视频.webm';
    $('#btn-download').style.display = 'block';
    $('#btn-download').onclick = () => a.click();
    info.textContent = `✅ 完成！大小 ${(state.videoBlob.size/1024).toFixed(0)} KB`;
    playCompleteSound();
    showToast('视频生成完成！');
  };

  mediaRecorder.start();

  const totalMs = state.duration * 1000;
  const steps = state.recipe.steps;
  const n = steps.length;
  const coverMs = Math.max(2000, totalMs * 0.15);
  const ingMs = state.recipe.ingredients.length > 4 ? Math.max(2000, totalMs * 0.1) : 0;
  const stepMs = (totalMs - coverMs - ingMs - 2000) / n;
  const endMs = 2000;

  // 绘制函数
  function drawCover(progress) {
    ctx.fillStyle = '#2c1810';
    ctx.fillRect(0, 0, W, H);

    // Ken Burns 效果
    const zoom = 1 + progress * 0.1;
    ctx.save();
    ctx.translate(W/2, H/2);
    ctx.scale(zoom, zoom);
    ctx.translate(-W/2, -H/2);

    // 渐变背景
    const grd = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, H);
    grd.addColorStop(0, '#ff6b35');
    grd.addColorStop(1, '#2c1810');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();

    // 暗角
    drawVignette(0.4);

    // 标题
    ctx.font = 'bold 68px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.fillText(state.recipe.emoji, W/2, H/2 - 120);

    ctx.font = 'bold 52px sans-serif';
    ctx.fillStyle = '#ff6b35';
    const title = state.theme.length > 8 ? state.theme.substring(0, 8) : state.theme;
    ctx.fillText(title, W/2, H/2 - 10);

    ctx.font = '24px sans-serif';
    ctx.fillStyle = '#d4a590';
    ctx.fillText(state.recipe.desc, W/2, H/2 + 50);

    ctx.font = '20px sans-serif';
    ctx.fillStyle = '#aa8a70';
    ctx.fillText(`✦ ${steps.length} 步快手教程 ✦`, W/2, H/2 + 110);

    drawWatermark();
  }

  function drawIngredients(progress) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(40, 40, W-80, H-80);

    ctx.font = 'bold 38px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff6b35';
    ctx.fillText('🥗 所需食材', W/2, 110);

    ctx.font = '22px sans-serif';
    ctx.fillStyle = '#8a6a50';
    ctx.fillText('准备好这些食材，我们开始吧', W/2, 145);

    let y = 210;
    ctx.textAlign = 'left';
    state.recipe.ingredients.forEach((ing, i) => {
      ctx.fillStyle = i % 2 === 0 ? '#fff8f0' : '#fff3e8';
      ctx.fillRect(80, y-30, W-160, 50);
      ctx.font = 'bold 22px sans-serif';
      ctx.fillStyle = '#d85a1f';
      ctx.fillText((i+1) + '.', 100, y+5);
      ctx.font = '22px sans-serif';
      ctx.fillStyle = '#5a3820';
      ctx.fillText(ing.n, 140, y+5);
      ctx.textAlign = 'right';
      ctx.font = '20px sans-serif';
      ctx.fillStyle = '#8a6a50';
      ctx.fillText(ing.q, W-100, y+5);
      ctx.textAlign = 'left';
      y += 65;
    });

    drawWatermark();
  }

  function drawStep(idx, progress, img) {
    const colors = ['#f4a261', '#e76f51', '#e9c46a', '#2a9d8f', '#264653', '#ff6b35', '#d85a1f', '#c47020'];
    const c = colors[idx % colors.length];

    // 绘制图片（如果有）
    if (img) {
      // Ken Burns 效果
      const zoom = 1 + progress * 0.12;
      const sw = W / zoom;
      const sh = H / zoom;
      const sx = (W - sw) / 2;
      const sy = (H - sh) / 2;

      ctx.save();
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, W, H);
      ctx.restore();

      // 暗角
      drawVignette(0.5);
    } else {
      // 无图片时用渐变背景
      ctx.fillStyle = c;
      ctx.fillRect(0, 0, W, H);
      const grd = ctx.createLinearGradient(0, 0, W, H);
      grd.addColorStop(0, c);
      grd.addColorStop(1, '#2c1810');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, W, H);
    }

    // 底部文字区域
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, H*0.55, W, H*0.45);

    // 步骤编号
    ctx.font = 'bold 38px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.fillText(`步骤 ${idx+1} / ${steps.length}`, 60, 90);

    // 解说文字（卡拉OK效果）
    const text = steps[idx].text;
    const charDuration = stepMs * 0.7 / text.length;
    const charsRevealed = Math.min(Math.floor(progress * stepMs / charDuration), text.length);

    ctx.font = 'bold 32px sans-serif';
    ctx.textAlign = 'center';

    // 已读文字（橙色）
    const revealedText = text.substring(0, charsRevealed);
    ctx.fillStyle = '#ff6b35';
    wrapText(ctx, revealedText, W/2, H*0.65, W-120, 42);

    // 未读文字（灰色）
    const unrevealedText = text.substring(charsRevealed);
    ctx.fillStyle = '#c4a080';
    wrapText(ctx, unrevealedText, W/2, H*0.65 + charsRevealed * 0, W-120, 42);

    // 大号步骤数字
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = 'bold 180px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText((idx+1).toString(), W-40, H-40);

    drawWatermark();
  }

  function drawEnd(progress) {
    ctx.fillStyle = '#ff6b35';
    ctx.fillRect(0, 0, W, H);

    // Ken Burns
    const zoom = 1 + progress * 0.05;
    ctx.save();
    ctx.translate(W/2, H/2);
    ctx.scale(zoom, zoom);
    ctx.translate(-W/2, -H/2);
    ctx.fillStyle = '#ff6b35';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();

    ctx.font = 'bold 100px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.fillText(state.recipe.emoji, W/2, H/2 - 80);

    ctx.font = 'bold 44px sans-serif';
    ctx.fillText(state.theme, W/2, H/2);

    ctx.font = '28px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fillText('🎉 开动啦！', W/2, H/2 + 80);

    ctx.font = '22px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('✦ 美食工坊 一键生成 ✦', W/2, H-80);

    drawWatermark();
  }

  function drawVignette(intensity) {
    const grd = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.8);
    grd.addColorStop(0, 'rgba(0,0,0,0)');
    grd.addColorStop(1, `rgba(0,0,0,${intensity})`);
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
  }

  function drawWatermark() {
    if (!state.watermark) return;
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText('@美食工坊', W-30, H-20);
  }

  function wrapText(ctx, text, x, y, maxW, lh) {
    if (!text) return;
    const words = text.split('');
    let line = '';
    let lines = [];
    for (let i = 0; i < words.length; i++) {
      const test = line + words[i];
      const metrics = ctx.measureText(test);
      if (metrics.width > maxW && i > 0) {
        lines.push(line);
        line = words[i];
      } else {
        line = test;
      }
    }
    lines.push(line);
    lines.slice(0, 3).forEach((ln, idx) => ctx.fillText(ln, x, y + idx * lh));
  }

  function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  // 录制循环
  async function record() {
    const scenes = [];
    scenes.push({ type: 'cover', duration: coverMs });

    if (ingMs > 0) {
      scenes.push({ type: 'ing', duration: ingMs });
    }

    for (let i = 0; i < n; i++) {
      scenes.push({ type: 'step', idx: i, duration: stepMs, img: images[i] });
    }

    scenes.push({ type: 'end', duration: endMs });

    for (const s of scenes) {
      const start = performance.now();
      let p = 0;

      while (p < 1) {
        if (s.type === 'cover') {
          drawCover(p);
        } else if (s.type === 'ing') {
          drawIngredients(p);
        } else if (s.type === 'step') {
          drawStep(s.idx, p, s.img);
          // 语音解说（只在步骤开始时）
          if (p < 0.05) {
            speak(steps[s.idx].text.substring(0, 30));
          }
        } else if (s.type === 'end') {
          drawEnd(p);
        }

        p = Math.min(1, (performance.now() - start) / s.duration);
        await sleep(16);
      }
    }

    mediaRecorder.stop();
    info.textContent = '⏳ 正在编码视频...';
  }

  setTimeout(record, 200);
};

console.log('🍳 美食工坊 v2.1 已加载 - 真实图片 + 音效 + 语音 + Ken Burns');
</script></body></html>
