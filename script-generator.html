<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ff6b35">
<title>🎬 美食视频脚本生成器</title>
<style>
:root {
  --brand: #ff6b35;
  --brand-dark: #e85a24;
  --brand-light: #fff3ec;
  --accent: #f7c59f;
  --success: #4caf50;
  --text: #2a2a2a;
  --text-soft: #6b6b6b;
  --text-light: #9a9a9a;
  --bg: #faf8f5;
  --card: #ffffff;
  --border: #ececec;
  --shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
  --shadow-lg: 0 8px 24px rgba(255, 107, 53, 0.18);
  --radius: 14px;
  --radius-lg: 20px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
  color: var(--text);
  background: var(--bg);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overflow-x: hidden;
}

#app {
  max-width: 680px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  background: var(--bg);
}

/* ---------- HERO ---------- */
.hero {
  position: relative;
  padding: calc(50px + var(--safe-top)) 24px 40px;
  overflow: hidden;
  border-bottom-left-radius: var(--radius-lg);
  border-bottom-right-radius: var(--radius-lg);
  background: linear-gradient(135deg, #ff9558 0%, #ff6b35 50%, #e85a24 100%);
  color: #fff;
  box-shadow: var(--shadow-lg);
}
.hero-gradient {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.15) 0%, transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(255,200,150,0.2) 0%, transparent 40%);
  pointer-events: none;
}
.hero-content { position: relative; z-index: 1; text-align: center; }
.logo {
  font-size: 48px;
  margin-bottom: 6px;
  display: inline-block;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
}
.hero h1 { margin: 4px 0; font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
.subtitle { margin: 6px 0 0; opacity: 0.92; font-size: 13px; }

/* ---------- SECTIONS ---------- */
.section {
  padding: 0 16px;
  margin-top: 20px;
}
.section-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-title .icon { font-size: 18px; }

/* ---------- CARD ---------- */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 14px;
}

/* ---------- INPUT ---------- */
.field-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-soft);
  margin-bottom: 8px;
}
input[type="text"], select, textarea {
  width: 100%;
  padding: 12px 14px;
  font-size: 15px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: #fafafa;
  color: var(--text);
  font-family: inherit;
  transition: all 0.2s;
  outline: none;
}
input[type="text"]:focus, select:focus, textarea:focus {
  border-color: var(--brand);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
}
textarea { resize: vertical; min-height: 80px; }

/* ---------- CHIPS ---------- */
.chip-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.chip {
  padding: 8px 14px;
  border: 1.5px solid var(--border);
  border-radius: 100px;
  background: #fff;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-soft);
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.chip:active { transform: scale(0.96); }
.chip.active {
  background: var(--brand);
  border-color: var(--brand);
  color: #fff;
  box-shadow: 0 2px 8px rgba(255,107,53,0.3);
}

/* ---------- BUTTONS ---------- */
.btn-primary, .btn-ghost, .btn-outline {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
  color: #fff;
  box-shadow: 0 4px 14px rgba(255, 107, 53, 0.35);
}
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}
.btn-ghost {
  background: #fff;
  border: 1.5px solid var(--border);
  color: var(--text);
}
.btn-ghost:active { background: #f5f5f5; }
.btn-outline {
  background: transparent;
  border: 1.5px solid var(--brand);
  color: var(--brand);
}
.btn-outline:active { background: var(--brand-light); }

.btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 12px;
}

/* ---------- SCRIPT OUTPUT ---------- */
.script-output {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 20px;
}

.script-header {
  background: linear-gradient(135deg, #2c1810 0%, #4a2820 100%);
  color: #fff;
  padding: 18px 20px;
}
.script-header h2 {
  margin: 0 0 4px;
  font-size: 20px;
  font-weight: 700;
}
.script-header .meta {
  font-size: 12px;
  opacity: 0.8;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.script-header .meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* Script table */
.script-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.script-table th {
  background: #f5f0eb;
  color: var(--text-soft);
  font-weight: 600;
  font-size: 12px;
  padding: 10px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
}
.script-table td {
  padding: 12px;
  border-bottom: 1px solid #f0ebe6;
  vertical-align: top;
  line-height: 1.55;
}
.script-table tr:last-child td { border-bottom: none; }
.script-table .shot-num {
  font-weight: 700;
  color: var(--brand);
  width: 50px;
  text-align: center;
}
.script-table .shot-type {
  color: #8b6914;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  width: 70px;
}
.script-table .visual { color: var(--text); }
.script-table .audio {
  color: var(--text-soft);
  font-style: italic;
}
.script-table .duration {
  text-align: center;
  color: var(--brand-dark);
  font-weight: 600;
  width: 55px;
  font-size: 12px;
}
.script-table .note {
  font-size: 11px;
  color: var(--text-light);
  margin-top: 4px;
}

/* Section dividers in script */
.scene-divider {
  background: linear-gradient(90deg, var(--brand-light), #fff, var(--brand-light));
  padding: 8px 16px;
  font-weight: 700;
  font-size: 13px;
  color: var(--brand-dark);
  border-left: 4px solid var(--brand);
}

/* Tips section */
.tips-section {
  padding: 16px 20px;
  background: #fffbf7;
  border-top: 1px solid #ffe8d6;
}
.tips-title {
  font-weight: 700;
  font-size: 14px;
  color: var(--brand-dark);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tips-list {
  margin: 0;
  padding-left: 18px;
  color: var(--text-soft);
  font-size: 13px;
}
.tips-list li { margin-bottom: 4px; }

/* ---------- LOADING ---------- */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn 0.2s;
}
.loading-card {
  background: #fff;
  border-radius: 16px;
  padding: 28px 36px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  max-width: 280px;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid #ffe4d4;
  border-top-color: var(--brand);
  border-radius: 50%;
  margin: 0 auto 14px;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-card p { margin: 0; color: var(--text-soft); font-size: 14px; }
.loading-card .loading-status {
  margin-top: 8px;
  font-size: 12px;
  color: var(--text-light);
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ---------- TOAST ---------- */
.toast {
  position: fixed;
  bottom: calc(40px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(42,42,42,0.94);
  color: #fff;
  padding: 10px 20px;
  border-radius: 100px;
  font-size: 13px;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s;
  z-index: 200;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ---------- EXPORT BAR ---------- */
.export-bar {
  position: sticky;
  bottom: 0;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 12px 16px calc(12px + var(--safe-bottom));
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  z-index: 10;
}
.export-bar .btn-primary, .export-bar .btn-ghost {
  flex: 1;
  padding: 12px;
  font-size: 14px;
}

/* ---------- RECIPE SUGGESTIONS ---------- */
.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.suggestion-tag {
  padding: 6px 12px;
  background: var(--brand-light);
  color: var(--brand-dark);
  border-radius: 100px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.suggestion-tag:active {
  background: var(--brand);
  color: #fff;
}

/* ---------- EMPTY STATE ---------- */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
}
.empty-state .icon {
  font-size: 64px;
  margin-bottom: 12px;
  opacity: 0.5;
}
.empty-state p {
  margin: 4px 0;
  font-size: 14px;
}
.empty-state .hint {
  font-size: 12px;
  color: var(--text-light);
}

/* ---------- SWITCH ---------- */
.switch-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
}
.switch-label {
  font-size: 14px;
  color: var(--text);
}
.switch-desc {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 2px;
}
.switch {
  position: relative;
  width: 44px;
  height: 24px;
  flex-shrink: 0;
}
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: #ddd;
  transition: .3s;
  border-radius: 24px;
}
.slider:before {
  position: absolute;
  content: "";
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
  background-color: white;
  transition: .3s;
  border-radius: 50%;
}
input:checked + .slider { background-color: var(--brand); }
input:checked + .slider:before { transform: translateX(20px); }

/* ---------- VIDEO SECTION ---------- */
.video-section {
  margin: 16px 0;
}
.video-card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 14px;
}
.video-header {
  background: linear-gradient(135deg, #1a0f08 0%, #2c1810 100%);
  color: #fff;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.video-header h3 {
  margin: 0;
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
}
.video-preview-wrap {
  display: flex;
  justify-content: center;
  padding: 16px;
  background: #1a0f08;
}
.phone-frame {
  position: relative;
  width: 100%;
  max-width: 280px;
  aspect-ratio: 9 / 16;
  background: #000;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
#video-canvas {
  width: 100%;
  height: 100%;
  display: block;
}
.video-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
  gap: 8px;
  transition: opacity 0.3s;
}
.video-overlay.hidden { opacity: 0; pointer-events: none; }
.big-play {
  width: 56px; height: 56px;
  background: var(--brand);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  box-shadow: 0 4px 20px rgba(255,107,53,0.5);
  cursor: pointer;
}
.video-overlay p { margin: 0; font-size: 12px; opacity: 0.9; }
.video-progress {
  padding: 10px 16px;
  background: #faf8f5;
  border-top: 1px solid var(--border);
}
.progress-bar {
  height: 6px;
  background: #f0f0f0;
  border-radius: 100px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--brand), #ff9558);
  width: 0%;
  transition: width 0.3s;
  border-radius: 100px;
}
.progress-label {
  text-align: center;
  font-size: 12px;
  color: var(--text-soft);
  margin-top: 6px;
}
.video-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}
.video-actions .btn-primary, .video-actions .btn-ghost {
  padding: 10px;
  font-size: 13px;
}

/* 图片上传网格 */
.image-upload-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.image-upload-item {
  position: relative;
  aspect-ratio: 9/16;
  border-radius: 10px;
  border: 2px dashed #ddd;
  background: #fafafa;
  cursor: pointer;
  overflow: hidden;
  transition: all 0.2s;
}
.image-upload-item:hover {
  border-color: var(--brand);
  background: var(--brand-light);
}
.image-upload-item.has-image {
  border-style: solid;
  border-color: var(--brand);
}
.image-upload-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.image-upload-item .upload-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  font-size: 11px;
  color: #999;
}
.image-upload-item .upload-icon .icon {
  font-size: 24px;
  display: block;
  margin-bottom: 4px;
}
.image-upload-item .shot-num {
  position: absolute;
  top: 4px;
  left: 4px;
  background: var(--brand);
  color: white;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  z-index: 1;
}
.image-upload-item .remove-btn {
  position: absolute;
  top: 4px;
  right: 4px;
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  font-size: 12px;
  cursor: pointer;
  z-index: 1;
  display: none;
  align-items: center;
  justify-content: center;
}
.image-upload-item.has-image .remove-btn {
  display: flex;
}
.image-upload-item input[type=file] {
  display: none;
}

@media (max-width: 480px) {
  .script-table { font-size: 12px; }
  .script-table th, .script-table td { padding: 8px 10px; }
  .image-upload-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>
<div id="app">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-gradient"></div>
    <div class="hero-content">
      <div class="logo">🎬</div>
      <h1>美食视频脚本生成器</h1>
      <p class="subtitle">输入菜品名称，一键生成专业分镜脚本</p>
    </div>
  </div>

  <!-- INPUT SECTION -->
  <div class="section" id="input-section">
    <div class="card">
      <label class="field-label">🍽 菜品名称</label>
      <input type="text" id="dish-input" placeholder="例如：红烧肉、番茄炒蛋、提拉米苏..." />
      <div class="suggestions" id="suggestions">
        <span class="suggestion-tag" data-dish="红烧肉">红烧肉</span>
        <span class="suggestion-tag" data-dish="番茄炒蛋">番茄炒蛋</span>
        <span class="suggestion-tag" data-dish="蛋炒饭">蛋炒饭</span>
        <span class="suggestion-tag" data-dish="麻婆豆腐">麻婆豆腐</span>
        <span class="suggestion-tag" data-dish="可乐鸡翅">可乐鸡翅</span>
        <span class="suggestion-tag" data-dish="葱油拌面">葱油拌面</span>
        <span class="suggestion-tag" data-dish="提拉米苏">提拉米苏</span>
        <span class="suggestion-tag" data-dish="蒜蓉西兰花">蒜蓉西兰花</span>
      </div>
    </div>

    <div class="card">
      <label class="field-label">⏱ 视频时长</label>
      <div class="chip-row" id="duration-chips">
        <button class="chip active" data-duration="30">30秒</button>
        <button class="chip" data-duration="60">1分钟</button>
        <button class="chip" data-duration="90">1分半</button>
        <button class="chip" data-duration="120">2分钟</button>
      </div>
    </div>

    <div class="card">
      <label class="field-label">🎥 脚本风格</label>
      <div class="chip-row" id="style-chips">
        <button class="chip active" data-style="home">家常温馨</button>
        <button class="chip" data-style="pro">专业教程</button>
        <button class="chip" data-style="vlog">Vlog 口语</button>
      </div>

      <div style="margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px;">
        <div class="switch-row">
          <div>
            <div class="switch-label">加入拍摄技巧备注</div>
            <div class="switch-desc">在脚本中标注运镜、光线等建议</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="opt-tips" checked>
            <span class="slider"></span>
          </label>
        </div>
        <div class="switch-row">
          <div>
            <div class="switch-label">加入烹饪小贴士</div>
            <div class="switch-desc">脚本末尾附实用技巧总结</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="opt-cooking-tips" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>

    <button class="btn-primary" id="btn-generate" style="margin: 16px;">✨ 生成视频脚本</button>

    <div style="text-align: center; padding: 10px 0 30px; color: var(--text-light); font-size: 12px;">
      基于真实菜谱 · 专业分镜格式 · 去AI化口语表达
    </div>
  </div>

  <!-- OUTPUT SECTION -->
  <div id="output-section" style="display: none;">
    <div class="section" style="padding-top: 16px;">
      <button class="btn-ghost" id="btn-back" style="margin-bottom: 12px;">← 返回修改</button>
    </div>

    <!-- 视频预览区 -->
    <div class="video-section section">
      <div class="video-card">
        <div class="video-header">
          <h3>🎥 视频预览</h3>
          <span id="video-duration-label" style="font-size: 12px; opacity: 0.8;">--</span>
        </div>
        <div class="video-preview-wrap">
          <div class="phone-frame">
            <canvas id="video-canvas" width="360" height="640"></canvas>
            <div class="video-overlay" id="video-overlay">
              <div class="big-play" id="btn-play-video">▶</div>
              <p>点击播放预览视频</p>
            </div>
          </div>
        </div>
        <div class="video-progress" id="video-progress-section" style="display: none;">
          <div class="progress-bar">
            <div class="progress-fill" id="video-progress-fill"></div>
          </div>
          <div class="progress-label" id="video-progress-label">准备中...</div>
        </div>
        <div class="video-actions">
          <button class="btn-ghost" id="btn-play-video-btn">▶ 播放预览</button>

/* ==================== SCRIPT GENERATION ==================== */
/* 生成视频脚本的核心逻辑 */

function generateScript(dishName, duration, style, includeTips, includeCookingTips) {
  const recipe = RECIPE_DATABASE[dishName];
  if (!recipe) return null;

  const styleConfig = NARRATOR_STYLES[style] || NARRATOR_STYLES.home;
  const totalSteps = recipe.steps.length;
  
  // 计算各部分时长分配
  const coverDuration = Math.max(3, Math.round(duration * 0.1));
  const ingredientsDuration = Math.max(3, Math.round(duration * 0.08));
  const endingDuration = Math.max(3, Math.round(duration * 0.1));
  const remainingTime = duration - coverDuration - ingredientsDuration - endingDuration;
  const perStepDuration = Math.max(2, Math.floor(remainingTime / totalSteps));

  const shots = [];
  let shotNum = 1;

  // ===== 开场镜头 =====
  shots.push({
    scene: '开场',
    num: shotNum++,
    type: SHOT_TYPES.close,
    visual: `成品展示 - ${dishName}${recipe.emoji}的诱人特写，热气腾腾，色泽诱人`,
    audio: pickRandom(styleConfig.intro) + `${dishName}。${recipe.intro}，咱们这就开始！`,
    duration: coverDuration,
    note: includeTips ? '建议用慢动作展示热气腾腾的效果，暖光打在食物上更有食欲' : '',
  });

  // ===== 食材展示 =====
  const ingredientsText = recipe.ingredients.map(i => `${i.item} ${i.amount}`).join('、');
  shots.push({
    scene: '食材',
    num: shotNum++,
    type: SHOT_TYPES.top,
    visual: `食材平铺展示 - ${ingredientsText}，整齐摆放在料理台上`,
    audio: `食材很简单，就这些：${recipe.ingredients.slice(0, 5).map(i => i.item).join('、')}${recipe.ingredients.length > 5 ? '等等' : ''}。`,
    duration: ingredientsDuration,
    note: includeTips ? '俯视角度拍摄，食材分类摆放，画面干净清爽' : '',
  });

  // ===== 烹饪步骤 =====
  recipe.steps.forEach((step, idx) => {
    const stepDuration = perStepDuration + (idx === recipe.steps.length - 1 ? 1 : 0);
    
    // 主镜头
    shots.push({
      scene: `步骤${idx + 1}`,
      num: shotNum++,
      type: pickShotType(idx),
      visual: step.action,
      audio: generateStepNarration(step, idx, totalSteps, styleConfig),
      duration: stepDuration,
      note: includeTips ? step.tip : '',
    });

    // 关键步骤加一个细节特写镜头（有tip的步骤）
    if (step.tip && includeTips && stepDuration >= 4) {
      shots.push({
        scene: `步骤${idx + 1}细节`,
        num: shotNum++,
        type: SHOT_TYPES.detail,
        visual: `${step.detail}`,
        audio: generateTipNarration(step.tip, styleConfig),
        duration: Math.max(2, Math.floor(stepDuration * 0.5)),
        note: '',
      });
    }
  });

  // ===== 结尾镜头 =====
  shots.push({
    scene: '结尾',
    num: shotNum++,
    type: SHOT_TYPES.medium,
    visual: `成品摆盘展示 - 做好的${dishName}，配上装饰，角度缓慢旋转展示`,
    audio: pickRandom(styleConfig.ending) + `${dishName}就做好啦，趁热吃最香！`,
    duration: endingDuration,
    note: includeTips ? '360度环绕拍摄，配上暖光，突出食物的质感和色泽' : '',
  });

  // 总时长
  const totalCalcDuration = shots.reduce((sum, s) => sum + s.duration, 0);

  return {
    dishName,
    emoji: recipe.emoji,
    intro: recipe.intro,
    difficulty: recipe.difficulty,
    cookTime: recipe.cookTime,
    totalDuration: totalCalcDuration,
    shotCount: shots.length,
    ingredients: recipe.ingredients,
    shots,
    cookingTips: includeCookingTips ? recipe.cookingTips : [],
    style,
  };
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function pickShotType(stepIdx) {
  const types = [SHOT_TYPES.medium, SHOT_TYPES.close, SHOT_TYPES.near, SHOT_TYPES.detail, SHOT_TYPES.top];
  return types[stepIdx % types.length];
}

function generateStepNarration(step, idx, total, styleConfig) {
  const ordinalWords = ['首先', '然后', '接着', '下一步', '之后', '随后', '最后'];
  const ordinal = ordinalWords[idx] || `第${idx + 1}步`;
  
  let narration = `${ordinal}，${step.action}。`;
  
  // 适度加入口语化表达（去AI化）
  if (styleConfig.fillers.length > 0 && Math.random() > 0.6) {
    const filler = pickRandom(styleConfig.fillers);
    if (Math.random() > 0.5) {
      narration = filler + narration;
    }
  }
  
  return narration;
}

function generateTipNarration(tip, styleConfig) {
  return pickRandom(styleConfig.tipIntro) + tip;
}

/* ==================== RENDER SCRIPT ==================== */
function renderScript(script) {
  let html = '';
  
  // 头部信息
  html += `
    <div class="script-output">
      <div class="script-header">
        <h2>${script.emoji} ${script.dishName} · 视频脚本</h2>
        <div class="meta">
          <span>⏱ 约 ${script.totalDuration} 秒</span>
          <span>🎬 ${script.shotCount} 个镜头</span>
          <span>📊 难度：${script.difficulty}</span>
          <span>🍳 烹饪时间：${script.cookTime}</span>
        </div>
      </div>
  `;

  // 食材清单
  html += `
    <div class="scene-divider">🧺 食材清单</div>
    <div style="padding: 12px 16px; font-size: 13px; color: var(--text-soft);">
      ${script.ingredients.map(i => `● ${i.item} <span style="float: right; color: var(--brand-dark);">${i.amount}</span>`).join('<br>')}
    </div>
  `;

  // 分镜表
  html += `
    <div class="scene-divider">🎬 分镜脚本</div>
    <div style="overflow-x: auto;">
      <table class="script-table">
        <thead>
          <tr>
            <th style="text-align:center;">镜号</th>
            <th>景别</th>
            <th>画面内容</th>
            <th>台词/旁白</th>
            <th style="text-align:center;">时长</th>
          </tr>
        </thead>
        <tbody>
  `;

  script.shots.forEach(shot => {
    const noteHtml = shot.note ? `<div class="note">💡 ${shot.note}</div>` : '';
    html += `
      <tr>
        <td class="shot-num">${shot.num}</td>
        <td class="shot-type">${shot.type}</td>
        <td class="visual">${shot.visual}${noteHtml}</td>
        <td class="audio">"${shot.audio}"</td>
        <td class="duration">${shot.duration}s</td>
      </tr>
    `;
  });

  html += `
        </tbody>
      </table>
    </div>
  `;

  // 烹饪小贴士
  if (script.cookingTips && script.cookingTips.length > 0) {
    html += `
      <div class="tips-section">
        <div class="tips-title">💡 烹饪小贴士</div>
        <ul class="tips-list">
          ${script.cookingTips.map(t => `<li>${t}</li>`).join('')}
        </ul>
      </div>
    `;
  }

  html += `</div>`;

  return html;
}

/* ==================== EXPORT FUNCTIONS ==================== */
function scriptToText(script) {
  let text = '';
  text += `${script.emoji} ${script.dishName} · 美食视频脚本\n`;
  text += `═══════════════════════════════════\n\n`;
  text += `【基本信息】\n`;
  text += `  菜品名称：${script.dishName}\n`;
  text += `  视频时长：约 ${script.totalDuration} 秒\n`;
  text += `  镜头数量：${script.shotCount} 个\n`;
  text += `  烹饪难度：${script.difficulty}\n`;
  text += `  烹饪时间：${script.cookTime}\n\n`;
  
  text += `【食材清单】\n`;
  script.ingredients.forEach(i => {
    text += `  ● ${i.item}：${i.amount}\n`;
  });
  text += `\n`;
  
  text += `【分镜脚本】\n`;
  text += `───────────────────────────────────\n`;
  
  let currentScene = '';
  script.shots.forEach(shot => {
    if (shot.scene !== currentScene) {
      text += `\n【${shot.scene}】\n`;
      currentScene = shot.scene;
    }
    text += `  镜头 ${shot.num} | ${shot.type} | ${shot.duration}秒\n`;
    text += `  ▶ 画面：${shot.visual}\n`;
    text += `  ▶ 旁白：${shot.audio}\n`;
    if (shot.note) {
      text += `  💡 备注：${shot.note}\n`;
    }
    text += `\n`;
  });
  
  if (script.cookingTips && script.cookingTips.length > 0) {
    text += `\n【烹饪小贴士】\n`;
    script.cookingTips.forEach((t, i) => {
      text += `  ${i + 1}. ${t}\n`;
    });
  }
  
  text += `\n═══════════════════════════════════\n`;
  text += `脚本由美食视频脚本生成器生成\n`;
  
  return text;
}

$('btn-generate').addEventListener('click', () => {
  const dish = $('dish-input').value.trim();
  if (!dish) {
    showToast('请输入菜品名称');
    return;
  }
  
  state.dish = dish;
  state.includeTips = $('opt-tips').checked;
  state.includeCookingTips = $('opt-cooking-tips').checked;
  
  // 模拟生成过程（有真实数据不需要真的生成，但加个loading体验更好）
  showLoading('正在构思分镜...');
  
  const loadingSteps = ['分析菜谱结构', '设计镜头语言', '撰写旁白文案', '优化节奏时长'];
  let stepIdx = 0;
  const loadingInterval = setInterval(() => {
    stepIdx++;
    if (stepIdx < loadingSteps.length) {
      $('loading-status').textContent = loadingSteps[stepIdx];
    }
  }, 300);
  
  setTimeout(() => {
    clearInterval(loadingInterval);
    hideLoading();
    
    const script = generateScript(
      state.dish,
      state.duration,
      state.style,
      state.includeTips,
      state.includeCookingTips
    );
    
    if (!script) {
      $('output-section').style.display = 'none';
      $('empty-state').style.display = 'block';
      $('input-section').style.display = 'none';
      showToast('暂无该菜品的脚本模板');
      return;
    }
    
    state.currentScript = script;
    $('script-content').innerHTML = renderScript(script);
    renderImageUploadGrid(script);
    $('input-section').style.display = 'none';
    $('output-section').style.display = 'block';
    $('image-upload-section').style.display = 'block';
    $('empty-state').style.display = 'none';
    window.scrollTo(0, 0);
    showToast('脚本生成完成！可上传自定义图片');
  }, 1200);
});

// 返回按钮
$('btn-back').addEventListener('click', () => {
  $('output-section').style.display = 'none';
  $('image-upload-section').style.display = 'none';
  $('input-section').style.display = 'block';
  $('empty-state').style.display = 'none';
  window.scrollTo(0, 0);
});

// 复制脚本
$('btn-copy').addEventListener('click', () => {
  if (!state.currentScript) return;
  const text = scriptToText(state.currentScript);
  navigator.clipboard.writeText(text).then(() => {
    showToast('脚本已复制到剪贴板 ✓');
  }).catch(() => {
    // 降级方案
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    showToast('脚本已复制 ✓');
  });
});

// 导出 TXT
$('btn-export').addEventListener('click', () => {
  if (!state.currentScript) return;
  const text = scriptToText(state.currentScript);
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${state.currentScript.dishName}-视频脚本.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('脚本已导出 ✓');
});

/* 加载图片工具函数 */
function loadVideoImage(url) {
  if (videoImageCache.has(url)) return Promise.resolve(videoImageCache.get(url));
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { videoImageCache.set(url, img); resolve(img); };
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

/* 预加载所有图片 - 优先使用用户上传的图片 */
async function preloadVideoImages(script) {
  const shots = script.shots;
  
  for (let i = 0; i < shots.length; i++) {
    const shot = shots[i];
    if (shot.userImage && !videoImageCache.has('user_' + i)) {
      const img = await new Promise(resolve => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => resolve(null);
        image.src = shot.userImage;
      });
      if (img) videoImageCache.set('user_' + i, img);
    }
  }
}

/* 获取步骤对应的图片 - 优先用户上传 */
function getStepImage(script, shotIdx) {
  const userImg = videoImageCache.get('user_' + shotIdx);
  if (userImg) return userImg;
  return null;
}

/* ===== 场景绘制函数 ===== */

function drawVignette(cx, intensity = 0.5) {
  const grad = cx.createRadialGradient(VW/2, VH/2, VH*0.2, VW/2, VH/2, VH*0.85);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, `rgba(0,0,0,${intensity})`);
  cx.fillStyle = grad;
  cx.fillRect(0, 0, VW, VH);
}

function drawKenBurns(cx, img, t, duration, intensity = 1) {
  if (!img) return;
  const progress = Math.min(t / duration, 1);
  const zoomStart = 1.0, zoomEnd = 1.15;
  const zoom = zoomStart + (zoomEnd - zoomStart) * progress;
  const iw = img.width, ih = img.height;
  const imgAspect = iw / ih, canvasAspect = VW / VH;
  let dw = VW * zoom, dh = VW * zoom / imgAspect;
  if (dh < VH * zoom) { dh = VH * zoom; dw = dh * imgAspect; }
  const sx = (VW - dw) / 2, sy = (VH - dh) / 2;
  cx.drawImage(img, sx, sy, dw, dh);
  drawVignette(cx, 0.45 * intensity);
}

function drawRoundRect(cx, x, y, w, h, r) {
  cx.beginPath();
  cx.moveTo(x+r, y); cx.lineTo(x+w-r, y);
  cx.quadraticCurveTo(x+w, y, x+w, y+r);
  cx.lineTo(x+w, y+h-r); cx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  cx.lineTo(x+r, y+h); cx.quadraticCurveTo(x, y+h, x, y+h-r);
  cx.lineTo(x, y+r); cx.quadraticCurveTo(x, y, x+r, y);
  cx.closePath();
}

function wrapTextLines(cx, text, maxW, fontSize, lineH) {
  const chars = text.split('');
  const lines = [];
  let cur = '';
  cx.font = `600 ${fontSize}px -apple-system,"PingFang SC",sans-serif`;
  for (const ch of chars) {
    if (ch === '\n') { lines.push(cur); cur = ''; continue; }
    const test = cur + ch;
    if (cx.measureText(test).width > maxW && cur.length > 0) {
      lines.push(cur);
      cur = ch;
    } else {
      cur = test;
    }
  }
  if (cur) lines.push(cur);
  return lines;
}

/* 绘制开场场景 */
function drawCoverScene(cx, script, t, duration, img) {
  cx.clearRect(0, 0, VW, VH);
  
  if (img) {
    drawKenBurns(cx, img, t, duration);
  } else {
    const grad = cx.createLinearGradient(0, 0, 0, VH);
    grad.addColorStop(0, '#2c1810');
    grad.addColorStop(0.5, '#4a2820');
    grad.addColorStop(1, '#1a0f08');
    cx.fillStyle = grad;
    cx.fillRect(0, 0, VW, VH);
  }
  
  // 半透明叠加
  cx.fillStyle = 'rgba(0,0,0,0.35)';
  cx.fillRect(0, 0, VW, VH);
  
  const fadeIn = Math.min(t / 0.6, 1);
  const slideUp = Math.min(t / 0.8, 1);
  const easeOut = 1 - Math.pow(1 - slideUp, 3);
  
  cx.save();
  cx.globalAlpha = fadeIn;
  
  // 装饰线
  cx.strokeStyle = 'rgba(255,200,150,0.3)';
  cx.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    cx.beginPath();
    cx.moveTo(0, VH * 0.2 + i * 25);
    cx.lineTo(VW, VH * 0.2 + i * 25);
    cx.stroke();
  }
  
  // 大表情
  cx.font = 'bold 90px sans-serif';
  cx.textAlign = 'center';
  cx.fillStyle = '#fff';
  cx.shadowColor = 'rgba(0,0,0,0.5)';
  cx.shadowBlur = 20;
  cx.fillText(script.emoji, VW/2, VH*0.32 - (1 - easeOut) * 30);
  cx.shadowBlur = 0;
  
  // 菜名
  const titleSize = Math.min(36, (VW - 80) / (script.dishName.length * 0.9));
  cx.font = `800 ${titleSize}px -apple-system,"PingFang SC",sans-serif`;
  cx.fillStyle = '#fff';
  cx.shadowColor = 'rgba(0,0,0,0.6)';
  cx.shadowBlur = 16;
  cx.shadowOffsetY = 3;
  cx.fillText(script.dishName, VW/2, VH*0.48 - (1 - easeOut) * 40);
  cx.shadowBlur = 0;
  cx.shadowOffsetY = 0;
  
  // 副标题
  if (script.intro) {
    cx.font = '500 16px -apple-system,"PingFang SC",sans-serif';
    cx.fillStyle = '#ffd9b8';
    cx.fillText(script.intro, VW/2, VH*0.56 - (1 - easeOut) * 20);
  }
  
  // 装饰条
  cx.fillStyle = '#ff6b35';
  cx.fillRect(VW/2 - 40, VH*0.62, 80, 3);
  cx.font = '400 13px -apple-system,"PingFang SC",sans-serif';
  cx.fillStyle = '#ffcba8';
  cx.fillText(`${script.shots.length - 2} 步完整教程`, VW/2, VH*0.67);
  
  cx.restore();
}

/* 绘制食材场景 */
function drawIngredientsScene(cx, script, t, duration) {
  cx.clearRect(0, 0, VW, VH);
  
  // 背景
  const bgGrad = cx.createLinearGradient(0, 0, 0, VH);
  bgGrad.addColorStop(0, '#fef9f4');
  bgGrad.addColorStop(1, '#f5ebe0');
  cx.fillStyle = bgGrad;
  cx.fillRect(0, 0, VW, VH);
  
  const fadeIn = Math.min(t / 0.5, 1);
  cx.save();
  cx.globalAlpha = fadeIn;
  
  // 标题
  cx.font = '700 26px -apple-system,"PingFang SC",sans-serif';
  cx.textAlign = 'center';
  cx.fillStyle = '#ff6b35';
  cx.fillText('🧺  食材清单  🧺', VW/2, 60);
  
  // 分隔线
  cx.fillStyle = 'rgba(255,150,80,0.4)';
  cx.fillRect(VW/2 - 60, 80, 120, 2);
  
  // 食材卡片
  const cardX = 30, cardW = VW - 60;
  const items = script.ingredients.slice(0, 8);
  const cardH = Math.min(380, items.length * 42 + 50);
  const cardY = 110;
  
  drawRoundRect(cx, cardX, cardY, cardW, cardH, 14);
  cx.fillStyle = 'rgba(255,255,255,0.95)';
  cx.fill();
  
  // 食材列表
  items.forEach((ing, idx) => {
    const y = cardY + 35 + idx * 42;
    if (y > cardY + cardH - 30) return;
    cx.font = '22px sans-serif';
    cx.textAlign = 'left';
    cx.textBaseline = 'middle';
    cx.fillText('●', cardX + 20, y + 2);
    cx.font = '600 16px -apple-system,"PingFang SC",sans-serif';
    cx.fillStyle = '#2c1810';
    cx.fillText(ing.item, cardX + 40, y);
    cx.font = '500 14px -apple-system,"PingFang SC",sans-serif';
    cx.fillStyle = '#8b6914';
    cx.textAlign = 'right';
    cx.fillText(ing.amount, cardX + cardW - 20, y);
    if (idx < items.length - 1) {
      cx.fillStyle = 'rgba(200,160,100,0.2)';
      cx.fillRect(cardX + 20, y + 20, cardW - 40, 1);
    }
  });
  
  cx.restore();
}

/* 绘制步骤场景 */
function drawStepScene(cx, script, shot, t, duration, img) {
  cx.clearRect(0, 0, VW, VH);
  
  if (img) {
    drawKenBurns(cx, img, t, duration);
  } else {
    const bgGrad = cx.createLinearGradient(0, 0, 0, VH);
    bgGrad.addColorStop(0, '#fff5ee');
    bgGrad.addColorStop(0.5, '#ffe8d6');
    bgGrad.addColorStop(1, '#ffd4b8');
    cx.fillStyle = bgGrad;
    cx.fillRect(0, 0, VW, VH);
    
    const emoji = script.emoji || '🍳';
    cx.font = '160px sans-serif';
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    cx.globalAlpha = 0.15;
    const floatY = Math.sin(t * 1.5) * 10;
    cx.fillText(emoji, VW/2, VH*0.35 + floatY);
    cx.globalAlpha = 1;
    
    cx.fillStyle = '#ff6b35';
    cx.font = '700 20px -apple-system,"PingFang SC",sans-serif';
    cx.textAlign = 'center';
    cx.fillText(script.dishName, VW/2, 70);
  }
  
  if (!img) {
    cx.fillStyle = 'rgba(255,255,255,0.85)';
    cx.fillRect(0, VH*0.5, VW, VH*0.5);
  } else {
    cx.fillStyle = 'rgba(0,0,0,0.55)';
    cx.fillRect(0, VH*0.55, VW, VH*0.45);
    const topGrad = cx.createLinearGradient(0, VH*0.45, 0, VH*0.58);
    topGrad.addColorStop(0, 'rgba(0,0,0,0)');
    topGrad.addColorStop(1, 'rgba(0,0,0,0.5)');
    cx.fillStyle = topGrad;
    cx.fillRect(0, VH*0.45, VW, VH*0.13);
  }
  
  // 步骤徽章
  const badgeR = 28, badgeX = 50, badgeY = img ? 70 : VH*0.55;
  cx.save();
  cx.shadowColor = img ? 'rgba(0,0,0,0.5)' : 'rgba(255,107,53,0.3)';
  cx.shadowBlur = 16;
  cx.shadowOffsetY = 4;
  cx.beginPath();
  cx.arc(badgeX, badgeY, badgeR, 0, Math.PI * 2);
  const badgeGrad = cx.createLinearGradient(0, badgeY - badgeR, 0, badgeY + badgeR);
  badgeGrad.addColorStop(0, '#ff9558');
  badgeGrad.addColorStop(1, '#e85a24');
  cx.fillStyle = badgeGrad;
  cx.fill();
  cx.shadowBlur = 0;
  cx.shadowOffsetY = 0;
  cx.font = '800 24px -apple-system,"PingFang SC",sans-serif';
  cx.fillStyle = '#ffffff';
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText(shot.num.toString(), badgeX, badgeY - 2);
  
  // 步骤标签
  cx.font = '700 18px -apple-system,"PingFang SC",sans-serif';
  cx.fillStyle = img ? '#ffffff' : '#2c1810';
  cx.textAlign = 'left';
  cx.shadowColor = img ? 'rgba(0,0,0,0.6)' : 'transparent';
  cx.shadowBlur = img ? 6 : 0;
  cx.fillText(`${shot.scene}`, badgeX + badgeR + 14, badgeY - 2);
  cx.shadowBlur = 0;
  cx.restore();
  
  // 解说文字卡片
  const cardH = 160, cardY = VH - cardH - 20, cardX = 20, cardW = VW - 40;
  cx.save();
  
  drawRoundRect(cx, cardX, cardY, cardW, cardH, 14);
  const cardGrad = cx.createLinearGradient(0, cardY, 0, cardY + cardH);
  cardGrad.addColorStop(0, 'rgba(255,252,248,0.97)');
  cardGrad.addColorStop(1, 'rgba(255,240,228,0.97)');
  cx.fillStyle = cardGrad;
  cx.fill();
  
  // 顶部装饰条
  drawRoundRect(cx, cardX, cardY, cardW, 4, 2);
  cx.fillStyle = '#ff6b35';
  cx.fill();
  
  // 文字
  const text = shot.audio.replace(/"/g, '');
  const lines = wrapTextLines(cx, text, cardW - 40, 17, 28);
  const totalH = lines.length * 28;
  const startY = cardY + cardH / 2 - totalH / 2 + 14;
  
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  
  lines.slice(0, 4).forEach((line, i) => {
    cx.font = `600 17px -apple-system,"PingFang SC",sans-serif`;
    cx.fillStyle = '#2c1810';
    cx.fillText(line, VW/2, startY + i * 28);
  });
  
  cx.restore();
  
  if (img) drawVignette(cx, 0.3);
}

/* 绘制结尾场景 */
function drawEndingScene(cx, script, t, duration, img) {
  cx.clearRect(0, 0, VW, VH);
  
  if (img) {
    drawKenBurns(cx, img, t, duration);
    cx.fillStyle = 'rgba(0,0,0,0.4)';
    cx.fillRect(0, 0, VW, VH);
  } else {
    const grad = cx.createRadialGradient(VW/2, VH/2, 0, VW/2, VH/2, VH*0.7);
    grad.addColorStop(0, '#ff6b35');
    grad.addColorStop(1, '#8b0000');
    cx.fillStyle = grad;
    cx.fillRect(0, 0, VW, VH);
  }
  
  const fadeIn = Math.min(t / 0.6, 1);
  const bounce = Math.sin(t * 2.5) * 8;
  
  cx.save();
  cx.globalAlpha = fadeIn;
  
  // 大表情
  cx.font = 'bold 120px sans-serif';
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.globalAlpha = fadeIn * 0.5;
  cx.fillText(script.emoji, VW/2, VH*0.32 + bounce);
  cx.globalAlpha = fadeIn;
  
  // 菜名
  cx.font = '800 36px -apple-system,"PingFang SC",sans-serif';
  cx.fillStyle = '#ffffff';
  cx.shadowColor = 'rgba(0,0,0,0.6)';
  cx.shadowBlur = 20;
  cx.shadowOffsetY = 4;
  cx.fillText(script.dishName, VW/2, VH*0.52);
  cx.shadowBlur = 0;
  cx.shadowOffsetY = 0;
  
  // 完成文字
  cx.font = '500 20px -apple-system,"PingFang SC",sans-serif';
  cx.fillStyle = '#ffcba8';
  cx.fillText('✨ 制作完成 · 开动吧 ✨', VW/2, VH*0.6);
  
  // 星星装饰
  for (let i = 0; i < 6; i++) {
    const angle = (t * 0.5 + i * 1.05) % (Math.PI * 2);
    const r = 130;
    const sx = VW/2 + Math.cos(angle) * r;
    const sy = VH * 0.4 + Math.sin(angle) * r * 0.4;
    cx.font = '18px sans-serif';
    cx.fillStyle = `rgba(255,200,100,${0.4 + Math.sin(t * 2 + i) * 0.3})`;
    cx.fillText('✦', sx, sy);
  }
  
  cx.restore();
}

/* ===== 主渲染循环 ===== */
function buildVideoScenes(script) {
  const scenes = [];
  const imgLib = FOOD_IMAGE_LIBRARY[script.dishName] || GENERIC_FOOD_IMAGES;
  
  script.shots.forEach((shot, idx) => {
    let type = 'step';
    if (shot.scene === '开场') type = 'cover';
    else if (shot.scene === '食材') type = 'ingredients';
    else if (shot.scene === '结尾') type = 'ending';
    
    scenes.push({
      type,
      shot,
      duration: shot.duration,
      imageUrl: imgLib[idx % imgLib.length],
    });
  });
  
  return scenes;
}

/* 播放预览 */
async function playVideoPreview() {
  if (!state.currentScript) return;
  if (videoAnimFrame) cancelAnimationFrame(videoAnimFrame);
  
  const canvas = $('video-canvas');
  videoCtx = canvas.getContext('2d');
  
  const scenes = buildVideoScenes(state.currentScript);
  await preloadVideoImages(state.currentScript);
  
  $('video-overlay').classList.add('hidden');
  
  let sceneIdx = 0;
  let sceneTime = 0;
  let lastTime = performance.now();
  
  function loop(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    sceneTime += dt;
    
    if (sceneTime >= scenes[sceneIdx].duration) {
      sceneTime = 0;
      sceneIdx++;
      if (sceneIdx >= scenes.length) {
        videoAnimFrame = null;
        $('video-overlay').classList.remove('hidden');
        return;
      }
    }
    
    const sc = scenes[sceneIdx];
    const img = getStepImage(state.currentScript, sceneIdx);
    
    switch (sc.type) {
      case 'cover':
        drawCoverScene(videoCtx, state.currentScript, sceneTime, sc.duration, img);
        break;
      case 'ingredients':
        drawIngredientsScene(videoCtx, state.currentScript, sceneTime, sc.duration);
        break;
      case 'step':
        drawStepScene(videoCtx, state.currentScript, sc.shot, sceneTime, sc.duration, img);
        break;
      case 'ending':
        drawEndingScene(videoCtx, state.currentScript, sceneTime, sc.duration, img);
        break;
    }
    
    videoAnimFrame = requestAnimationFrame(loop);
  }
  
  videoAnimFrame = requestAnimationFrame(loop);
}

/* 导出视频 */
async function exportVideo() {
  if (!state.currentScript || isVideoExporting) return;
  isVideoExporting = true;
  
  const canvas = $('video-canvas');
  videoCtx = canvas.getContext('2d');
  
  const scenes = buildVideoScenes(state.currentScript);
  await preloadVideoImages(state.currentScript);
  
  // 检测支持的格式
  const candidates = [
    'video/webm;codecs=vp9',
    'video/webm;codecs=vp8',
    'video/webm',
  ];
  let mediaType = '';
  for (const t of candidates) {
    if (window.MediaRecorder && MediaRecorder.isTypeSupported(t)) { mediaType = t; break; }
  }
  if (!window.MediaRecorder || !mediaType) {
    showToast('当前浏览器不支持视频录制，建议使用 Chrome');
    isVideoExporting = false;
    return;
  }
  
  const stream = canvas.captureStream(30);
  videoChunks = [];
  try {
    videoRecorder = new MediaRecorder(stream, { mimeType: mediaType, videoBitsPerSecond: 3_000_000 });
  } catch (e) {
    videoRecorder = new MediaRecorder(stream, { mimeType: mediaType });
  }
  
  videoRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) videoChunks.push(e.data); };
  
  videoRecorder.onstop = () => {
    const blob = new Blob(videoChunks, { type: mediaType });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${state.currentScript.dishName}_美食视频.webm`;
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); }, 1000);
    $('video-progress-section').style.display = 'none';
    $('btn-generate-video').disabled = false;
    isVideoExporting = false;
    showToast('✅ 视频已生成并下载！');
  };
  
  $('btn-generate-video').disabled = true;
  $('video-progress-section').style.display = 'block';
  $('video-progress-fill').style.width = '0%';
  $('video-progress-label').textContent = '准备中...';
  $('video-overlay').classList.add('hidden');
  
  videoRecorder.start(100);
  
  const fps = 30, frameTime = 1 / fps;
  let sceneIdx = 0, sceneTime = 0, totalTime = 0;
  const totalDuration = scenes.reduce((s, sc) => s + sc.duration, 0);
  
  function nextFrame() {
    const sc = scenes[sceneIdx];
    const img = getStepImage(state.currentScript, sceneIdx);
    
    switch (sc.type) {
      case 'cover':
        drawCoverScene(videoCtx, state.currentScript, sceneTime, sc.duration, img);
        break;
      case 'ingredients':
        drawIngredientsScene(videoCtx, state.currentScript, sceneTime, sc.duration);
        break;
      case 'step':
        drawStepScene(videoCtx, state.currentScript, sc.shot, sceneTime, sc.duration, img);
        break;
      case 'ending':
        drawEndingScene(videoCtx, state.currentScript, sceneTime, sc.duration, img);
        break;
    }
    
    sceneTime += frameTime;
    totalTime += frameTime;
    const progress = Math.min(totalTime / totalDuration, 1);
    $('video-progress-fill').style.width = `${Math.floor(progress * 100)}%`;
    $('video-progress-label').textContent = `生成中 ${Math.floor(progress * 100)}%`;
    
    if (sceneTime >= sc.duration) {
      sceneTime = 0;
      sceneIdx++;
      if (sceneIdx >= scenes.length) {
        setTimeout(() => {
          videoRecorder.stop();
        }, 100);
        return;
      }
    }
    
    setTimeout(nextFrame, 1000 / fps);
  }
  
  setTimeout(nextFrame, 200);
}

/* 渲染图片上传网格 */
function renderImageUploadGrid(script) {
  const grid = $('image-upload-grid');
  grid.innerHTML = '';
  
  script.shots.forEach((shot, idx) => {
    const item = document.createElement('div');
    item.className = 'image-upload-item' + (shot.userImage ? ' has-image' : '');
    item.innerHTML = `
      <span class="shot-num">${shot.num}</span>
      <button class="remove-btn" data-idx="${idx}">×</button>
      ${shot.userImage ? `<img src="${shot.userImage}" alt="镜头${shot.num}">` : `
        <div class="upload-icon">
          <span class="icon">📷</span>
          <span>上传图片</span>
        </div>
      `}
      <input type="file" accept="image/*" data-idx="${idx}">
    `;
    
    const input = item.querySelector('input[type=file]');
    item.addEventListener('click', (e) => {
      if (e.target.classList.contains('remove-btn')) return;
      input.click();
    });
    
    input.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      handleImageUpload(idx, file);
    });
    
    const removeBtn = item.querySelector('.remove-btn');
    removeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      handleRemoveImage(idx);
    });
    
    grid.appendChild(item);
  });
}

/* 处理图片上传 */
function handleImageUpload(idx, file) {
  if (!file.type.startsWith('image/')) {
    showToast('请选择图片文件');
    return;
  }
  
  const reader = new FileReader();
  reader.onload = (e) => {
    compressImage(e.target.result, 800, 0.8).then((compressed) => {
      if (state.currentScript && state.currentScript.shots[idx]) {
        state.currentScript.shots[idx].userImage = compressed;
        videoImageCache.delete('user_' + idx);
        renderImageUploadGrid(state.currentScript);
        updateVideoPreview();
        showToast('图片上传成功 ✓');
      }
    });
  };
  reader.readAsDataURL(file);
}

/* 移除图片 */
function handleRemoveImage(idx) {
  if (state.currentScript && state.currentScript.shots[idx]) {
    delete state.currentScript.shots[idx].userImage;
    videoImageCache.delete('user_' + idx);
    renderImageUploadGrid(state.currentScript);
    updateVideoPreview();
    showToast('已移除图片');
  }
}

/* 压缩图片 */
function compressImage(dataUrl, maxWidth, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxWidth) {
        h = h * (maxWidth / w);
        w = maxWidth;
      }
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

/* 更新视频预览首帧 */
function updateVideoPreview() {
  if (!state.currentScript) return;
  const canvas = $('video-canvas');
  const ctx = canvas.getContext('2d');
  const scenes = buildVideoScenes(state.currentScript);
  preloadVideoImages(state.currentScript).then(() => {
    const img = getStepImage(state.currentScript, 0);
    drawCoverScene(ctx, state.currentScript, 0, scenes[0].duration, img);
  });
}

/* 初始化视频相关事件 */
function initVideoSection() {
  $('btn-play-video').addEventListener('click', () => {
    initAudio();
    playVideoPreview();
  });
  
  $('btn-play-video-btn').addEventListener('click', () => {
    initAudio();
    playVideoPreview();
  });
  
  $('btn-generate-video').addEventListener('click', () => {
    initAudio();
    exportVideo();
  });
}

/* 音频初始化 */
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch (e) { audioCtx = null; }
}

/* 在生成脚本后初始化视频部分 */
const _origGenerateBtn = $('btn-generate');
_origGenerateBtn.addEventListener('click', () => {
  setTimeout(() => {
    if (state.currentScript) {
      $('video-duration-label').textContent = `约 ${state.currentScript.totalDuration} 秒`;
      // 显示首帧
      const canvas = $('video-canvas');
      videoCtx = canvas.getContext('2d');
      const scenes = buildVideoScenes(state.currentScript);
      preloadVideoImages(state.currentScript).then(() => {
        const img = getStepImage(state.currentScript, 0);
        drawCoverScene(videoCtx, state.currentScript, 0, scenes[0].duration, img);
      });
    }
  }, 1300);
});

// 页面加载完成后初始化视频模块
document.addEventListener('DOMContentLoaded', initVideoSection);

console.log('🎬 美食视频脚本生成器已加载');
console.log('🎥 视频生成引擎已就绪');
